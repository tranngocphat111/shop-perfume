# ===================================
# PRODUCTION CONFIGURATION (AWS)
# ===================================

# ===================================
# SERVER CONFIGURATION
# ===================================
# Port sẽ được AWS Elastic Beanstalk hoặc EC2 tự động set
server.port=${PORT:8080}

# ===================================
# CORS CONFIGURATION
# ===================================
# Cấu hình CORS cho production frontend domain
# Ví dụ: cors.allowed.origins=https://your-app.com,https://www.your-app.com
# Hoặc sử dụng environment variable: CORS_ALLOWED_ORIGINS
# Cho phép set từ CI/CD secrets, fallback về domain production
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://shop-perfume.vercel.app}

# ===================================
# DATABASE CONFIGURATION
# ===================================
# ⚠️ BẮT BUỘC: Set environment variables trên AWS/GitHub Secrets:
#   DATABASE_URL=jdbc:mariadb://shop-perfume-db.cpggs0eyg7pm.ap-southeast-1.rds.amazonaws.com:3306/shopnuochoa?sslMode=trust
#   DATABASE_URL=jdbc:mariadb://shopnuochoa.cpggs0eyg7pm.ap-southeast-1.rds.amazonaws.com:3306/shopnuochoa?sslMode=trust
#   DATABASE_USERNAME=admin
#   DATABASE_PASSWORD=<your-password>
# KHÔNG được hardcode credentials ở đây!
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Connection Pool Settings cho production
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:10}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===================================
# JPA/HIBERNATE CONFIGURATION
# ===================================
# Production: không tự động update schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===================================
# LOGGING CONFIGURATION
# ===================================
# Production: chỉ log INFO và ERROR
logging.level.root=INFO
logging.level.iuh.fit.server=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springdoc=WARN

# ===================================
# JWT CONFIGURATION
# ===================================
# Production: BẮT BUỘC phải set JWT_SECRET environment variable
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===================================
# REDIS CACHE CONFIGURATION
# ===================================
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=${REDIS_TIMEOUT:2000ms}
spring.data.redis.repositories.enabled=false

# ===================================
# CLOUDINARY CONFIGURATION
# ===================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ===================================
# FILE UPLOAD CONFIGURATION
# ===================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

