# ===================================
# GOOGLE OAUTH CONFIGURATION
# ===================================
# Google OAuth Client ID (get from Google Cloud Console)
# WARNING: DO NOT hardcode credentials here! Use environment variables.
# Set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET via environment variables or GitHub Secrets
