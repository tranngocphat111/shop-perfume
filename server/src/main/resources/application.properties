# ===================================
# APPLICATION CONFIGURATION
# ===================================
spring.application.name=backend

# ===================================
# SERVER CONFIGURATION
# ===================================
server.port=8080
server.servlet.context-path=/api

# ===================================
# DATABASE CONFIGURATION
# ===================================
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/shopnuochoa?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=12345

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# ===================================
# JPA/HIBERNATE CONFIGURATION
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

# ===================================
# LOGGING CONFIGURATION
# ===================================
logging.level.root=INFO
logging.level.iuh.fit.server=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springdoc=DEBUG

# ===================================
# JSON CONFIGURATION
# ===================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.default-property-inclusion=non_null

# ===================================
# JWT CONFIGURATION
# ===================================
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation123456789ShopPerfume
jwt.expiration=86400000

# ===================================
# SPRINGDOC/SWAGGER CONFIGURATION
# ===================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ===================================
# MULTIPART/FILE UPLOAD CONFIGURATION
# ===================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================
# SPRING MVC CONFIGURATION
# ===================================
spring.web.resources.add-mappings=true
#spring.mvc.throw-exception-if-no-handler-found=false
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/
