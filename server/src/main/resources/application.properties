# ===================================
# APPLICATION CONFIGURATION
# ===================================
spring.application.name=backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:}

# ===================================
# SERVER CONFIGURATION
# ===================================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# ===================================
# CORS CONFIGURATION
# ===================================
# Cho phép nhiều origins cách nhau bởi dấu phẩy
# Development: http://localhost:3000
# Production: https://your-frontend-domain.com,https://www.your-frontend-domain.com
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ===================================
# DATABASE CONFIGURATION - AWS RDS
# ===================================
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
# AWS RDS Database - có thể override bằng environment variables
spring.datasource.url=${DATABASE_URL:jdbc:mariadb://shop-perfume-db.cpggs0eyg7pm.ap-southeast-1.rds.amazonaws.com:3306/shopnuochoa?sslMode=trust&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:admin}
spring.datasource.password=${DATABASE_PASSWORD:Ngocphat123}

# Connection Pool Settings
## Giảm pool size để tránh "Too many connections"
## AWS RDS có thể có giới hạn kết nối thấp, nên giảm pool size xuống
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:20000}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
# Phát hiện connection leak (cảnh báo nếu connection không được đóng sau 30 giây)
spring.datasource.hikari.leak-detection-threshold=30000
# Validation query để kiểm tra connection còn sống
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000
# Đăng ký connection pool metrics để theo dõi
spring.datasource.hikari.register-mbeans=true
# Giữ connection sống (keepalive) để tránh timeout - đã có mặc định 120000ms

# ===================================
# JPA/HIBERNATE CONFIGURATION
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

# ===================================
# LOGGING CONFIGURATION
# ===================================
# Development: DEBUG, Production: INFO (qua application-prod.properties)
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.iuh.fit.server=${LOG_LEVEL_APP:DEBUG}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:DEBUG}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_LEVEL_BINDER:TRACE}
logging.level.org.springdoc=${LOG_LEVEL_DOC:DEBUG}
# Log HikariCP connection pool để theo dõi connection
logging.level.com.zaxxer.hikari=${LOG_LEVEL_HIKARI:DEBUG}
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG
logging.level.com.zaxxer.hikari.pool.HikariPool=DEBUG

# ===================================
# JSON CONFIGURATION
# ===================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.default-property-inclusion=non_null

# ===================================
# JWT CONFIGURATION
# ===================================
# Sử dụng environment variable cho production, fallback về default secret cho development
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation123456789ShopPerfume}
# Access token: 30 minutes (1800000ms) - ngắn hơn để tăng bảo mật
jwt.expiration=${JWT_EXPIRATION:1800000}
# Refresh token: 7 days (604800000ms)
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===================================
# SPRINGDOC/SWAGGER CONFIGURATION
# ===================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ===================================
# MULTIPART/FILE UPLOAD CONFIGURATION
# ===================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================
# SEPAY WEBHOOK CONFIGURATION
# ===================================
sepay.webhook.api-key=${SEPAY_WEBHOOK_API_KEY:PASS_KEY}

# ===================================
# SPRING MVC CONFIGURATION
# ===================================
spring.web.resources.add-mappings=true
#spring.mvc.throw-exception-if-no-handler-found=false
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/
