# ===================================
# ADMIN INITIALIZATION CONFIGURATION
# ===================================
# ⚠️ BẢO MẬT: Chỉ enable trong development hoặc khi cần tạo admin lần đầu
# Set ADMIN_INIT_ENABLED=true để enable admin initialization
# Set ADMIN_INIT_EMAIL và ADMIN_INIT_PASSWORD qua environment variables
# KHÔNG hardcode credentials ở đây!
admin.init.enabled=${ADMIN_INIT_ENABLED:false}
admin.init.email=${ADMIN_INIT_EMAIL:}
admin.init.password=${ADMIN_INIT_PASSWORD:}

# ===================================
# GOOGLE OAUTH CONFIGURATION
# ===================================
# Google OAuth Client ID (get from Google Cloud Console)
# ⚠️ KHÔNG hardcode credentials ở đây! Sử dụng environment variables.
# Set GOOGLE_CLIENT_ID và GOOGLE_CLIENT_SECRET qua environment variables hoặc GitHub Secrets
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
# Google OAuth Client Secret (get from Google Cloud Console)
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
# Google OAuth Scopes
spring.security.oauth2.client.registration.google.scope=openid,profile,email


