name: Auto Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main # Thay đổi branch này nếu bạn dùng branch khác (main, master, develop, etc.)
    paths:
      - "server/**" # Chỉ deploy khi có thay đổi trong folder server
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        working-directory: ./server
        run: mvn clean package -DskipTests

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      
      - name: Add EC2 to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy JAR to EC2
        run: |
          scp server/target/server-*.jar ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/backend.jar

      - name: Update systemd service with environment variables
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            # Backup service file nếu chưa có
            if [ ! -f /etc/systemd/system/shop-perfume-backend.service.backup ]; then
              sudo cp /etc/systemd/system/shop-perfume-backend.service /etc/systemd/system/shop-perfume-backend.service.backup
            fi
            
            # Tạo service file mới với environment variables
            sed 's/^ *//' << 'SERVICE_EOF' | sudo tee /etc/systemd/system/shop-perfume-backend.service > /dev/null
            [Unit]
            Description=Shop Perfume Backend Service
            After=network.target

            [Service]
            Type=simple
            User=${{ secrets.EC2_USER }}
            WorkingDirectory=/home/${{ secrets.EC2_USER }}/app
            ExecStart=/usr/bin/java -jar /home/${{ secrets.EC2_USER }}/app/backend.jar
            Restart=always
            RestartSec=10
            Environment="SPRING_PROFILES_ACTIVE=prod"
            Environment="DATABASE_URL=${{ secrets.DATABASE_URL }}"
            Environment="DATABASE_USERNAME=${{ secrets.DATABASE_USERNAME }}"
            Environment="DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}"
            Environment="JWT_SECRET=${{ secrets.JWT_SECRET }}"
            Environment="GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}"
            Environment="GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}"
            Environment="CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}"
            Environment="CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}"
            Environment="CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}"
            Environment="CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}"
            Environment="FRONTEND_URL=${{ secrets.FRONTEND_URL }}"
            Environment="DB_POOL_MAX_SIZE=${{ secrets.DB_POOL_MAX_SIZE }}"
            Environment="DB_POOL_MIN_IDLE=${{ secrets.DB_POOL_MIN_IDLE }}"
            Environment="DB_CONNECTION_TIMEOUT=${{ secrets.DB_CONNECTION_TIMEOUT }}"
            Environment="MAIL_HOST=${{ secrets.MAIL_HOST }}"
            Environment="MAIL_PORT=${{ secrets.MAIL_PORT }}"
            Environment="MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}"
            Environment="MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}"
            Environment="MAIL_FROM=${{ secrets.MAIL_FROM }}"
            Environment="REDIS_HOST=${{ secrets.REDIS_HOST }}"
            Environment="REDIS_PORT=${{ secrets.REDIS_PORT }}"


            [Install]
            WantedBy=multi-user.target
                        SERVICE_EOF
            
            # Reload systemd để nhận cấu hình mới
            sudo systemctl daemon-reload
          EOF

      - name: Deploy and restart on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            # Tạo thư mục nếu chưa có
            mkdir -p ~/app
            
            # Backup JAR cũ
            if [ -f ~/app/backend.jar ]; then
              mv ~/app/backend.jar ~/app/backend.jar.backup
            fi
            
            # Copy JAR mới
            mv ~/backend.jar ~/app/backend.jar

            # Đảm bảo Docker có sẵn để chạy Redis cache
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y docker.io
            fi

            # Bật Docker service nếu chưa chạy
            sudo systemctl enable docker
            sudo systemctl start docker

            # Khởi tạo/refresh Redis container cho backend cache
            REDIS_PORT="${{ secrets.REDIS_PORT }}"
            if [ -z "$REDIS_PORT" ]; then
              REDIS_PORT=6380
            fi

            sudo docker rm -f shop-perfume-redis >/dev/null 2>&1 || true
            sudo docker pull redis:7-alpine
            sudo docker run -d \
              --name shop-perfume-redis \
              --restart unless-stopped \
              -p ${REDIS_PORT}:6379 \
              -v redis-data:/data \
              redis:7-alpine redis-server --appendonly yes
            
            # Dừng service cũ (nếu đang chạy)
            sudo systemctl stop shop-perfume-backend || true
            
            # Chạy JAR mới
            sudo systemctl start shop-perfume-backend
            
            # Kiểm tra status
            sleep 5
            sudo systemctl status shop-perfume-backend
          EOF
