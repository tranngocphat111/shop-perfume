name: Auto Deploy Backend to AWS EC2

on:
  push:
    branches:
      - develop  # Thay đổi branch này nếu bạn dùng branch khác (main, master, develop, etc.)
    paths:
      - 'server/**'  # Chỉ deploy khi có thay đổi trong folder server
  workflow_dispatch:  # Cho phép chạy thủ công từ GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      working-directory: ./server
      run: mvn clean package -DskipTests
    
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
    
    - name: Add EC2 to known hosts
      run: |
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
    
    - name: Copy JAR to EC2
      run: |
        scp server/target/server-*.jar ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/backend.jar
    
    - name: Copy systemd service file to EC2
      run: |
        scp server/shop-perfume-backend.service ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/shop-perfume-backend.service
    
    - name: Deploy and restart on EC2
      run: |
        ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
          set -e
          
          # Get current user
          CURRENT_USER=\$(whoami)
          USER_HOME=\$(eval echo ~\$CURRENT_USER)
          
          echo "Current user: \$CURRENT_USER"
          echo "User home: \$USER_HOME"
          
          # Tạo thư mục nếu chưa có
          mkdir -p \$USER_HOME/app
          
          # Update service file với user đúng
          echo "Updating systemd service file with correct user..."
          sed "s|User=ubuntu|User=\$CURRENT_USER|g; s|/home/ubuntu|$USER_HOME|g" /tmp/shop-perfume-backend.service > /tmp/shop-perfume-backend-updated.service
          
          # Setup systemd service nếu chưa có
          if [ ! -f /etc/systemd/system/shop-perfume-backend.service ]; then
            echo "Setting up systemd service..."
            sudo cp /tmp/shop-perfume-backend-updated.service /etc/systemd/system/shop-perfume-backend.service
            sudo systemctl daemon-reload
            sudo systemctl enable shop-perfume-backend
          else
            # Update service file nếu có thay đổi
            echo "Updating systemd service..."
            sudo cp /tmp/shop-perfume-backend-updated.service /etc/systemd/system/shop-perfume-backend.service
            sudo systemctl daemon-reload
          fi
          
          # Backup JAR cũ
          if [ -f \$USER_HOME/app/backend.jar ]; then
            mv \$USER_HOME/app/backend.jar \$USER_HOME/app/backend.jar.backup
          fi
          
          # Copy JAR mới
          mv \$USER_HOME/backend.jar \$USER_HOME/app/backend.jar
          
          # Dừng service cũ (nếu đang chạy)
          echo "Stopping service..."
          sudo systemctl stop shop-perfume-backend || true
          
          # Đợi một chút để đảm bảo service đã dừng hoàn toàn
          sleep 3
          
          # Chạy JAR mới
          echo "Starting service..."
          sudo systemctl start shop-perfume-backend
          
          # Đợi service khởi động
          sleep 10
          
          # Kiểm tra status
          echo "Checking service status..."
          if sudo systemctl is-active --quiet shop-perfume-backend; then
            echo "✅ Service is running!"
            sudo systemctl status shop-perfume-backend --no-pager -l
          else
            echo "❌ Service failed to start!"
            echo "Recent logs:"
            sudo journalctl -u shop-perfume-backend -n 50 --no-pager
            exit 1
          fi
          
          # Kiểm tra port có đang listen không
          echo "Checking if port 8080 is listening..."
          if sudo netstat -tlnp 2>/dev/null | grep :8080 || sudo ss -tlnp 2>/dev/null | grep :8080; then
            echo "✅ Port 8080 is listening!"
          else
            echo "⚠️  Port 8080 is not listening. Check logs above."
          fi
        EOF